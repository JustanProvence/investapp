services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketresearch
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d marketresearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/marketresearch
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: docker/ui/Dockerfile
    ports:
      - "8550:8550"
    environment:
      API_BASE_URL: http://api:8000
    env_file:
      - .env
    depends_on:
      - api

volumes:
  pgdata:
